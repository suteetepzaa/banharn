<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบคะแนน 02181331</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10">

    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-t-3xl p-8 border-b-4 border-green-600 shadow-sm text-center md:text-left">
            <h1 class="text-2xl font-bold text-gray-800">📊 ผลคะแนนรายบุคคล</h1>
            <p class="text-gray-500">วิชา 02181331 การสื่อสารทางเกษตรและสิ่งแวดล้อมศึกษา</p>
        </div>

        <div class="bg-white p-6 shadow-sm flex flex-col md:flex-row items-end gap-4">
            <div class="flex-grow w-full">
                <label class="block text-sm font-bold text-gray-600 mb-2">ระบุรหัสนิสิตเพื่อค้นหา</label>
                <input type="text" id="studentID" placeholder="เช่น 6720600494" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>
            <button onclick="checkScore()" 
                class="w-full md:w-40 bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-lg transition-all shadow-md">
                ค้นหาข้อมูล
            </button>
        </div>

        <div id="resultArea" class="hidden mt-6 overflow-hidden">
            <div class="bg-white rounded-xl shadow-lg overflow-x-auto">
                <table class="w-full text-center border-collapse">
                    <thead>
                        <tr class="bg-gray-800 text-white">
                            <th class="px-4 py-4 font-medium border-r border-gray-700">รหัสนิสิต</th>
                            <th class="px-4 py-4 font-medium border-r border-gray-700">เข้าเรียน (10)</th>
                            <th class="px-4 py-4 font-medium border-r border-gray-700">คะแนนเก็บ (40)</th>
                            <th class="px-4 py-4 font-medium border-r border-gray-700">คะแนนสอบ (50)</th>
                            <th class="px-4 py-4 font-medium border-r border-gray-700">รวม (100)</th>
                            <th class="px-4 py-4 font-bold bg-green-700">เกรด</th>
                        </tr>
                    </thead>
                    <tbody class="text-lg">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td id="resID" class="px-4 py-6 border-b font-semibold text-gray-700">-</td>
                            <td id="resAtt" class="px-4 py-6 border-b text-blue-600">-</td>
                            <td id="resWork" class="px-4 py-6 border-b text-blue-600">-</td>
                            <td id="resExam" class="px-4 py-6 border-b text-orange-600">-</td>
                            <td id="resTotal" class="px-4 py-6 border-b font-bold text-gray-800">-</td>
                            <td id="resGrade" class="px-4 py-6 border-b font-black text-2xl text-green-700">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-right px-2">
                <button onclick="window.print()" class="text-sm text-gray-500 hover:text-green-600 underline">
                    🖨️ พิมพ์ใบแจ้งคะแนน
                </button>
            </div>
        </div>

        <div id="errorArea" class="hidden mt-6 p-4 bg-red-100 text-red-700 rounded-lg text-center border border-red-200">
            ❌ ไม่พบข้อมูลรหัสนิสิตนี้ในระบบ กรุณาตรวจสอบเลขรหัสอีกครั้ง
        </div>
    </div>

    <script>
        // ข้อมูลคะแนน (Database)
        const scoreData = {
            "6720600494": { att: 10, work: 35, exam: 42 },
            "6510000001": { att: 9, work: 32, exam: 30 }
        };

        function getGrade(score) {
            if (score >= 80) return "A";
            if (score >= 75) return "B+";
            if (score >= 70) return "B";
            if (score >= 65) return "C+";
            if (score >= 60) return "C";
            if (score >= 55) return "D+";
            if (score >= 50) return "D";
            return "F";
        }

        function checkScore() {
            const input = document.getElementById('studentID').value.trim();
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');

            if (scoreData[input]) {
                const data = scoreData[input];
                const total = data.att + data.work + data.exam;

                document.getElementById('resID').innerText = input;
                document.getElementById('resAtt').innerText = data.att;
                document.getElementById('resWork').innerText = data.work;
                document.getElementById('resExam').innerText = data.exam;
                document.getElementById('resTotal').innerText = total;
                document.getElementById('resGrade').innerText = getGrade(total);

                resultArea.classList.remove('hidden');
                errorArea.classList.add('hidden');
            } else {
                resultArea.classList.add('hidden');
                errorArea.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
