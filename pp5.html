<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Anuphan', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="glass p-6 rounded-3xl shadow-xl flex flex-col items-center text-center">
            <div class="w-24 h-24 bg-blue-500 rounded-full mb-4 shadow-lg flex items-center justify-center text-white text-3xl font-bold">
                ครู
            </div>
            <h3 class="text-xl font-semibold text-gray-800">ครูสมชาย ใจดี</h3>
            <p class="text-sm text-gray-500 mb-6">กลุ่มสาระการเรียนรู้คณิตศาสตร์</p>
            
            <div class="w-full space-y-3">
                <div class="p-3 bg-green-100 text-green-700 rounded-2xl text-sm font-medium">ส่งแล้ว 8 วิชา</div>
                <div class="p-3 bg-yellow-100 text-yellow-700 rounded-2xl text-sm font-medium">รอดำเนินการ 2 วิชา</div>
            </div>
        </div>

        <div class="md:col-span-2 glass p-8 rounded-3xl shadow-xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800">ส่งเอกสาร ปพ.5</h2>
                <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase tracking-wider font-bold">เทอม 1/2569</span>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">เลือกรายวิชาที่ต้องการส่ง</label>
                    <select class="w-full bg-white border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-400 p-3 rounded-xl transition duration-200 outline-none">
                        <option>ค21101 คณิตศาสตร์พื้นฐาน 1 (ม.1/1)</option>
                        <option>ค21101 คณิตศาสตร์พื้นฐาน 1 (ม.1/2)</option>
                        <option>ค21102 คณิตศาสตร์เพิ่มเติม 1 (ม.1/1)</option>
                    </select>
                </div>

                <div class="relative group">
                    <div class="border-2 border-dashed border-gray-300 group-hover:border-blue-400 rounded-2xl p-10 transition-all duration-300 flex flex-col items-center justify-center bg-gray-50/50 group-hover:bg-blue-50/50">
                        <svg class="w-12 h-12 text-gray-400 group-hover:text-blue-500 mb-4 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-gray-600 font-medium">ลากไฟล์ไฟล์มาวางที่นี่ หรือ <span class="text-blue-500 underline cursor-pointer">เลือกไฟล์</span></p>
                        <p class="text-xs text-gray-400 mt-2">รองรับไฟล์ .xlsx, .pdf (ไม่เกิน 20MB)</p>
                    </div>
                    <input type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                </div>

                <button type="button" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-blue-200 transform hover:-translate-y-1 transition duration-300">
                    ยืนยันการอัปโหลดเอกสาร
                </button>
            </form>
        </div>

    </div>

</body>
</html>
