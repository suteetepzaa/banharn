<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6 border border-gray-100">
        
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-blue-600">ระบบส่งเอกสาร ปพ.5</h1>
            <p class="text-xs text-gray-400">โรงเรียนของคุณ</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">รหัสครู</label>
                <input type="text" placeholder="ระบุรหัสประจำตัว" required
                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">ไฟล์เอกสาร (สูงสุด 50 ไฟล์)</label>
                <div class="relative border-2 border-dashed border-gray-200 rounded-lg p-4 hover:bg-blue-50 transition text-center cursor-pointer">
                    <input type="file" multiple name="files[]" id="files" 
                        class="absolute inset-0 opacity-0 cursor-pointer"
                        onchange="document.getElementById('file-count').innerText = this.files.length + ' ไฟล์ที่เลือกไว้'">
                    
                    <svg class="w-8 h-8 mx-auto text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 4v16m8-8H4"></path>
                    </svg>
                    <p id="file-count" class="text-sm text-gray-500">กดเพื่อเลือกไฟล์</p>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition transform active:scale-95">
                ยืนยันการส่งเอกสาร
            </button>

        </form>

        <p class="text-[10px] text-center text-gray-400 mt-4 uppercase tracking-tighter">Academic Document System v1.0</p>
    </div>

</body>
</html>
