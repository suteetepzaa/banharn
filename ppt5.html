<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-4 text-gray-800">ส่งเล่ม ปพ.5 ออนไลน์</h2>
    
    <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">รหัสวิชา/ชื่อวิชา</label>
            <input type="text" name="subject" class="mt-1 block w-full border rounded-md p-2" placeholder="เช่น ว31101 วิทยาศาสตร์">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">ระดับชั้น</label>
            <select name="grade" class="mt-1 block w-full border rounded-md p-2">
                <option>ม.1</option>
                <option>ม.2</option>
                </select>
        </div>

        <div class="border-2 border-dashed border-blue-300 p-6 text-center rounded-lg">
            <input type="file" name="file_pp5" id="file" class="hidden">
            <label for="file" class="cursor-pointer text-blue-600 hover:underline">คลิกเพื่อเลือกไฟล์ ปพ.5 (Excel/PDF)</label>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
            บันทึกและส่งฝ่ายวิชาการ
        </button>
    </form>
</div>
